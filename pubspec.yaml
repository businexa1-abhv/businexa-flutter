name: businexa
description: "Businexa - QR-based Advertisement Platform for Businesses"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Routing
  go_router: ^14.0.0

  # UI & Responsive Design
  flutter_screenutil: ^5.9.0

  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0

  # QR Code Generation
  qr_flutter: ^4.1.0

  # Utils
  uuid: ^4.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  dio: ^5.3.0
  permission_handler: ^11.4.0

  # WhatsApp & URL Launcher
  url_launcher: ^6.2.0

  # Payment
  razorpay_flutter: ^1.3.0

  # DevTools
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
